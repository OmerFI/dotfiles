set -g mouse on

set -g mode-keys vi

set -g history-limit 5000

# ref: https://stackoverflow.com/a/68043814/14892434
set -g status-interval 3
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_command},fish},#{b:pane_current_path},#{pane_current_command}}"

# macOS only: Claude Code reports its process name as a version string (e.g.
# 2.1.177), so tmux shows the number instead of "claude". Detect an N.N command,
# relabel it, and keep that name authoritative. Not needed on Linux/WSL, where
# the command name is already correct.
if-shell '[ "$(uname)" = Darwin ]' 'set -g automatic-rename-format "#{?#{==:#{pane_current_command},fish},#{b:pane_current_path},#{?#{m/r:^[0-9]+\.[0-9]+,#{pane_current_command}},claude,#{pane_current_command}}}"'
if-shell '[ "$(uname)" = Darwin ]' 'set -g allow-rename off'

# Bind r to reload tmux config
bind r source-file ~/.tmux.conf \; display "Config reloaded 🚀"

set -g default-terminal "tmux-256color"

# Advertise 24-bit (truecolor) to apps. tmux 3.2+ syntax.
set -as terminal-features ",*:RGB"

# Faster ESC and focus-events for Neovim (see :checkhealth)
set -sg escape-time 10
set -g focus-events on

set -g detach-on-destroy off

# Split in the current pane's directory instead of the session root
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
